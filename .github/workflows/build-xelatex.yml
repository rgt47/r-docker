name: Build rmd-xelatex image

on:
  push:
    branches: [main]
    paths:
      - 'xelatex/Dockerfile'
      - '.github/workflows/build-xelatex.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: xelatex
          push: true
          tags: |
            ghcr.io/rgt47/rmd-xelatex:4.6.0
            ghcr.io/rgt47/rmd-xelatex:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
